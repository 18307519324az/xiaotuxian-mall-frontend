  <!-- 价格 -->
  <text x="100" y="140" text-anchor="middle" font-size="28" font-weight="bold" fill="#fff" font-family="sans-serif">¥119</text>
  <!-- 商品名 -->
  <text x="100" y="172" text-anchor="middle" font-size="13" fill="#fff" font-family="sans-serif">手冲咖啡壶套装·分享壶6…</text>
