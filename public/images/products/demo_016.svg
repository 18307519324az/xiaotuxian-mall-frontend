      <stop offset="0%" style="stop-color:#8FB0C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7295A6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine_demo_016" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2)" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)" />
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="200" rx="8" ry="8" fill="url(#grad_demo_016)"/>
  <!-- 高光 -->
  <rect width="200" height="120" rx="8" ry="8" fill="url(#shine_demo_016)"/>
  <!-- 装饰圆 -->
  <circle cx="160" cy="40" r="30" fill="rgba(255,255,255,0.08)"/>
  <circle cx="40" cy="160" r="25" fill="rgba(255,255,255,0.06)"/>
  <circle cx="170" cy="150" r="20" fill="rgba(255,255,255,0.05)"/>
  <!-- 品类图标 -->
  <text x="100" y="70" text-anchor="middle" font-size="36" fill="rgba(255,255,255,0.9)">🍵</text>
  <!-- 商品编号 -->
